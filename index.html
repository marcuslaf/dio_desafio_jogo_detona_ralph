<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Jogo Detona Ralph - Um jogo de reação e velocidade">
        <title>Detona Ralph</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./src/styles/reset.css">
        <link rel="stylesheet" href="./src/styles/main.css">
    </head>
    <body>
        <div class="container">
            <header class="menu" role="banner">
                <div class="menu-time">
                    <h2 class="menu-title">Time Left</h2>
                    <h2 id="time-left" class="menu-value" aria-live="polite">0</h2>
                </div>
                <div class="menu-score">
                    <h2 class="menu-title">Your Score</h2>
                    <h2 id="score" class="menu-value" aria-live="polite">0</h2>
                </div>
                <div class="menu-lives">
                    <img src="./src/images/player.png" alt="Ícone do jogador" height="60px" />
                    <div class="lives-container">Lives: <span id="lives" aria-live="polite">3</span></div>
                </div>
            </header>

            <main class="game-area">
                <div class="panel" role="grid" aria-label="Área do jogo">
                    <div class="panel-row">
                        <div class="square" id="1" role="gridcell" tabindex="0" aria-label="Quadrado 1"></div>
                        <div class="square" id="2" role="gridcell" tabindex="0" aria-label="Quadrado 2"></div>
                        <div class="square" id="3" role="gridcell" tabindex="0" aria-label="Quadrado 3"></div>
                    </div>
                    <div class="panel-row">
                        <div class="square" id="4" role="gridcell" tabindex="0" aria-label="Quadrado 4"></div>
                        <div class="square" id="5" role="gridcell" tabindex="0" aria-label="Quadrado 5"></div>
                        <div class="square" id="6" role="gridcell" tabindex="0" aria-label="Quadrado 6"></div>
                    </div>
                    <div class="panel-row">
                        <div class="square" id="7" role="gridcell" tabindex="0" aria-label="Quadrado 7"></div>
                        <div class="square" id="8" role="gridcell" tabindex="0" aria-label="Quadrado 8"></div>
                        <div class="square" id="9" role="gridcell" tabindex="0" aria-label="Quadrado 9"></div>
                    </div>
                </div>
            </main>

            <div id="start-screen" class="start-screen" role="dialog" aria-labelledby="start-title">
                <div class="start-content">
                    <h1 id="start-title" class="start-title">DETONA RALPH</h1>
                    <p class="start-instructions">Clique nos inimigos o mais rápido possível!</p>
                    <p class="start-rules">Você tem 60 segundos e 3 vidas. Boa sorte!</p>
                    <button id="start-button" class="start-button" aria-label="Iniciar jogo">
                        JOGAR
                    </button>
                </div>
            </div>
        </div>
        <script defer src="./src/scripts/engine.js"></script>
    </body>
</html>
